name: Auto Create Pull Request

permissions:
  contents: write
  pull-requests: write

on:
  push:
    branches:
      - "feat/*"  # runs when pushing feature branches
      - "fix/*"   # runs when pushing fix branches
      - "chore/*" # runs when pushing chore branches
  pull_request:
    types: [opened, reopened, ready_for_review]

jobs:
  pull-request:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: pull-request
      uses: diillson/auto-pull-request@v1.0.1
      with:
        source_branch: ""                                 # If blank, default: triggered branch
        destination_branch: "dev"                         # If blank, default: master
        pr_title: "Pulling ${{ github.ref }} into dev"    # Title of pull request
        pr_body: |                                        # Full markdown support, requires pr_title to be set
          :crown: *An automated PR*
        # pr_template: ".github/PULL_REQUEST_TEMPLATE.md"         # Path to pull request template, requires pr_title to be set, excludes pr_body
        pr_reviewer: "rachmadideni"                         # Comma-separated list (no spaces)
        pr_assignee: "rachmadideni"                         # Comma-separated list (no spaces)
        pr_label: "auto-pr"                               # Comma-separated list (no spaces)
        # pr_milestone: "Milestone 1"                       # Milestone name no Required it is comment
        pr_draft: false                                    # Creates pull request as draft
        pr_allow_empty: true                              # Creates pull request even if there are no changes
        github_token: ${{ secrets.GITHUB_TOKEN }}      # If blank, default: secrets.GITHUB_TOKEN
  add-reviews:
    runs-on: ubuntu-latest
    needs: pull-request
    if: github.event_name == 'pull_request'
    steps:
      - name: auto assign
        uses: kentaro-m/auto-assign-action@v2.0.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/auto_assign.yml